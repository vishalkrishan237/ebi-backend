services:
  - type: web
    name: ebi-backend
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    preDeployCommand: npm run migrate
    startCommand: npm start
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: FRONTEND_ORIGIN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
